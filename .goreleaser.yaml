version: 2

project_name: emissor-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: emissor-cli
    main: ./cmd/emissor-cli
    binary: emissor-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: binaries
    ids:
      - emissor-cli
    formats:
      - binary
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: gabriellsalesx
    name: Emissor_CLI
  draft: false
  prerelease: auto
